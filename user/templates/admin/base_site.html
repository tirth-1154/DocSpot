    {% extends "admin/base.html" %}
    {% load static %}

    {% block title %}{{ title }} | DocSpot Admin{% endblock %}

    {% block extrastyle %}
        {{ block.super }}
        <link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% endblock %}

    {% block branding %}
    <div id="branding">
        <h1 id="site-name">
            <i class="fa-solid fa-hospital-user mr-2"></i> DocSpot <span style="font-weight: 300; font-size: 0.8em; color: var(--secondary-color);">Hospital Admin</span>
        </h1>
    </div>
    {% endblock %}

    {% block nav-global %}
    <div id="user-tools">
        {{ block.super }}
        <a href="{% url 'logout' %}" class="logout-link">Log out</a>
    </div>
    {% endblock %}
